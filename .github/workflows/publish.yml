name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -o wow-ping.exe wow-ping.go
      - name: Prepare release bundle
        run: |
          NAME="wow-ping-${{ github.ref_name }}.windows-amd64"
          mkdir "$NAME"
          cp -r servers "$NAME/"
          cp ping*.bat "$NAME/"
          cp wow-ping.exe "$NAME/"
          cp *.md "$NAME/"
          zip -qr "${NAME}.zip" "$NAME"
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: wow-ping-${{ github.ref_name }}.windows-amd64.zip
