name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go run wow-ping.go -stats=2 -stats-interval=1s
      - run: go build cmd/realmlist/realmlist.go
